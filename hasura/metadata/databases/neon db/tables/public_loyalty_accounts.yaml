table:
  name: loyalty_accounts
  schema: public
object_relationships:
  - name: partner
    using:
      foreign_key_constraint_on: partner_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: transactions
    using:
      foreign_key_constraint_on:
        column: account_id
        table:
          name: loyalty_transactions
          schema: public
select_permissions:
  - role: partner
    permission:
      columns: '*'
      filter:
        partner_id:
          _eq: X-Hasura-Partner-Id
  - role: user
    permission:
      columns: '*'
      filter:
        user_id:
          _eq: X-Hasura-User-Id
